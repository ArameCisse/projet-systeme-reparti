services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-projet_sr}
      POSTGRES_USER: ${DB_USER:-projet_sr}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-projet_sr}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-projet_sr}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DB_ENGINE: postgres
      DB_NAME: ${DB_NAME:-projet_sr}
      DB_USER: ${DB_USER:-projet_sr}
      DB_PASSWORD: ${DB_PASSWORD:-projet_sr}
      DB_HOST: db
      DB_PORT: 5432
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure-secret-key-change-me}
      DJANGO_DEBUG: 1
      DJANGO_ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE: http://localhost:8000/api
    depends_on:
      - backend
    ports:
      - "3000:3000"

  jenkins:
    image: jenkins/jenkins:lts
    user: root
    privileged: true
    ports:
      - "8081:8080" # Accès via localhost:8081
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock # Permet à Jenkins de builder tes images Docker
    depends_on:
      - backend

volumes:
  db_data:
  jenkins_home:
